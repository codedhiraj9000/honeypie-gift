<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift For My Love❤️</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

  <script src="tailwind.config.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-start min-h-screen px-4 py-10 md:py-16 relative">

  <!-- Decorative blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- ── Page wrapper ──────────────────────────────────────── -->
  <div class="relative z-10 w-full max-w-2xl flex flex-col items-center gap-6">

    <!-- Header -->
    <header class="text-center select-none">
      <p class="text-xs font-semibold tracking-[0.22em] uppercase text-plum-400 mb-2">Something special for</p>
      <h1 class="font-display text-3xl sm:text-4xl md:text-5xl text-plum-900 leading-tight">
        MY <span class="italic text-plum-500">HoneyPie❤️</span>
        <span class="sparkle ml-1">✦</span>
      </h1>
      <p class="mt-2 text-sm font-bold text-plum-400 font-body">nicher generate button click koro</p>
    </header>

    <!-- Main Card -->
    <main class="glass-card w-full rounded-4xl shadow-soft-xl p-5 sm:p-7 flex flex-col gap-4">

      <!-- Progress row -->
      <div class="flex items-center gap-3">
        <div class="flex-1 h-2 rounded-full bg-plum-100 overflow-hidden">
          <div id="progress-fill" style="width:0%"></div>
        </div>
        <span id="progress-label" class="text-xs font-semibold text-plum-400 whitespace-nowrap">0 / 10</span>
        <div id="completion-badge" class="text-xs font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 rounded-full px-3 py-1">
          ✓ Done
        </div>
      </div>

      <!-- Scrollable component container -->
      <div
        id="component-container"
        class="w-full rounded-3xl bg-plum-50/60 border border-plum-100 overflow-y-auto"
        style="min-height:220px; max-height:360px; padding:20px;"
        aria-label="Generated text components"
        aria-live="polite"
      >
        <!-- chips injected here -->
        <div id="chip-wrap" class="flex flex-wrap gap-2 content-start"></div>
      </div>

      <!-- Status bar -->
      <div id="status-bar" class="flex items-center gap-2 text-xs text-plum-400">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Ready to generate…</span>
      </div>

      <!-- Action row -->
      <div class="flex items-center justify-between flex-wrap gap-3">
        <button id="start-btn" class="btn-primary" aria-label="Start generating components">
          ✦ Generate Components
        </button>
        <button id="reset-btn" class="btn-primary" style="background:linear-gradient(135deg,#d8b4fe,#a855f7); opacity:0.7" disabled aria-label="Reset">
          ↺ Reset
        </button>
      </div>

    </main>

    <!-- Footer -->
    <footer class="text-center text-xs text-plum-300 select-none pb-4">
      Build and develop by Dhiraj
    </footer>
  </div>


<!-- ══════════════════════════════════════════════════════════ -->
<!--  Compiled TypeScript (ES2020 JS)                          -->
<!-- ══════════════════════════════════════════════════════════ -->
<script src="main.js"></script>
</body>
</html>
